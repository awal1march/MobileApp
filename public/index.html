<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📶 VTU Data Dashboard</title>

<!-- NOTICE BAR -->
<marquee style="background:#111;color:#fff;padding:10px;">
Welcome to our Virtual Top Up service. Buy data easily! Contact: 0542217459
</marquee>

<style>

/* BODY */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #2c5364);
}

/* HEADER */
.header {
    background: #000;
    color: #fff;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

/* MAIN CARD */
.container {
    max-width: 400px;
    margin: 40px auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    text-align: center;
}

/* INPUTS */
input, select {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 15px;
}

/* BUTTONS */
button {
    width: 95%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
    background: #007bff;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0056b3;
}

/* NETWORK BUTTONS */
.network-buttons {
    display: flex;
    justify-content: space-around;
    margin: 15px 0;
}

.network-btn {
    border: none;
    background: #f5f5f5;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.network-btn:hover {
    transform: scale(1.1);
    background: #e0e0e0;
}

.logo {
    width: 50px;
    height: 40px;
}

/* OUTPUT */
#log, #balance {
    margin-top: 15px;
    font-size: 14px;
}

/* NOTICE */
.notice {
    background: #ffcc00;
    padding: 12px;
    text-align: center;
    font-weight: bold;
}

/* FOOTER */
.footer {
    text-align: center;
    color: #fff;
    padding: 15px;
    font-size: 14px;
}

</style>
</head>

<body>

<div class="header">
📶 VTU Data Purchase Dashboard
</div>

<div class="container">

<h3>Buy Data Instantly</h3>

<!-- EMAIL -->
<input type="email" id="email" placeholder="Enter your email">

<!-- PHONE -->
<input type="tel" id="phone" placeholder="Enter beneficiary number">

<!-- NETWORK -->
<div class="network-buttons">
    <button class="network-btn" onclick="selectNetwork('mtn')">
        <img src="images/mtn.jpg" class="logo">
    </button>

    <button class="network-btn" onclick="selectNetwork('vodafone')">
        <img src="images/tel.jpg" class="logo">
    </button>

    <button class="network-btn" onclick="selectNetwork('airteltigo')">
        <img src="images/atg.jpg" class="logo">
    </button>
</div>

<!-- PLAN -->
<select id="plan">
    <option value="">Select data plan</option>
</select>

<!-- ACTIONS -->
<button onclick="buyBundle()">💳 Pay & Buy Data</button>
<button onclick="getWalletBalance()">💰 Check Wallet</button>

<!-- MTN LINK -->
<button onclick="openMTN()">🌐 Visit MTN Website</button>

<!-- OUTPUT -->
<div id="balance"></div>
<div id="log"></div>

</div>

<!-- NOTICE -->
<div class="notice">
⚠️ If MoMo prompt fails, dial *170# → Pending Approvals → Option 3
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 VTU App | Powered by You 🚀
</div>

<!-- PAYSTACK -->
<script src="https://js.paystack.co/v1/inline.js"></script>

<!-- SCRIPT -->
<script src="script.js"></script>

<script>
function openMTN(){
    window.open("https://www.mtn.com", "_blank");
}
</script>

</body>
</html>
